<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Legends Tactical MAPPINGS</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1a1a1a;
            --accent: #ffb400;
            --bl-side: #e74c3c; /* Red */
            --gr-side: #3498db; /* Blue */
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 300px; height: 100vh; background: var(--panel); padding: 20px; box-sizing: border-box; border-right: 1px solid #333; overflow-y: auto; z-index: 100; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #map-viewport { flex-grow: 1; position: relative; background: #000; overflow: hidden; background-size: contain; background-repeat: no-repeat; background-position: center; }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }

        .section { margin-bottom: 15px; padding: 12px; background: #252525; border-radius: 6px; border: 1px solid #333; }
        h3 { margin: 0 0 10px 0; font-size: 12px; letter-spacing: 1px; color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 5px; }

        select, button { width: 100%; padding: 10px; margin: 4px 0; border-radius: 4px; border: none; background: #3d3d3d; color: white; cursor: pointer; font-weight: bold; transition: 0.1s; }
        button:hover { background: #505050; }

        /* Buttons */
        .btn-bl { background: var(--bl-side); }
        .btn-gr { background: var(--gr-side); }
        .btn-clear { background: #555; font-size: 11px; }
        .btn-danger { background: #8e1a1a; margin-top: 20px; }

        /* Spawner Grid */
        .util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .spawn-item { padding: 10px; text-align: center; font-size: 11px; border: 1px solid #444; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .spawn-item:active { transform: scale(0.95); }

        /* Tokens */
        .token { position: absolute; cursor: grab; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.6); z-index: 10; user-select: none; transform: translate(-50%, -50%); }
        .token:active { cursor: grabbing; }
        
        .player-token { width: 36px; height: 36px; border-radius: 50%; }
        .bl-token { background: var(--bl-side); }
        .gr-token { background: var(--gr-side); }
        
        .util-token { border-radius: 4px; padding: 5px 10px; }
        .smoke-cloud { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.7); border: 2px dashed #000; color: #000; }
        .flash-token { background: #f1c40f; color: #000; }
        .he-token { background: #d35400; }
        .molly-token { background: #e67e22; }
        .c4-token { background: #c0392b; border: 2px solid #ff0000; }
        
        /* New Text Token */
        .text-token { background: rgba(0,0,0,0.6); border: 1px dashed var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000; white-space: nowrap; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin:0 0 20px 0; color:var(--accent); text-align:center;">CF Legends Tactical Mappings</h2>

    <div class="section">
        <h3>1. MAP SELECT</h3>
        <select id="mapSelect" onchange="updateMap()">
            <option value="">CHOOSE A MAP</option>
            <option value="black_widow.png">Black Widow</option>
			<option value="Sub_Base.png">Sub Base</option>
			<option value="Satellite.png">Satellite</option>
			<option value="Festival.png">Festival</option>
			<option value="Desert.png">Desert</option>
			<option value="Ankara.png">Ankara</option>
			<option value="Power_Supply.png">Power Supply</option>
			<option value="Eagle_Eye.png">Eagle Eye</option>
        </select>
    </div>

    <div class="section">
        <h3>2. TEAM SETUP</h3>
        <button id="sideToggleBtn" class="btn-bl" onclick="toggleSide()" style="margin-bottom: 10px;">MODE: OFFENSE (BLACK LIST)</button>
        
        <div class="util-grid">
            <button style="background: #333;" onclick="spawnPlayer('Enemy', true)">+ Enemy</button>
            <button style="background: #555;" onclick="spawnPlayer('IGL', false)">+ IGL</button>
            <button style="background: #555;" onclick="spawnPlayer('SNR', false)">+ SNIPER</button>
            <button style="background: #555;" onclick="spawnPlayer('LURK', false)">+ LURK</button>
            <button style="background: #555;" onclick="spawnPlayer('SUP', false)">+ SUPPORT</button>
            <button style="background: #555;" onclick="spawnPlayer('ENT', false)">+ ENTRY</button>
        </div>
        <button class="btn-clear" style="margin-top: 10px;" onclick="clearTokens('player-token')">Clear All Players</button>
    </div>

    <div class="section">
        <h3>3. UTILITY & C4</h3>
        <div class="util-grid">
            <div class="spawn-item" style="background: #95a5a6; color: #000;" onclick="spawnToken('SMOKE', 'smoke-cloud')">SMOKE</div>
            <div class="spawn-item" style="background: #f1c40f; color: #000;" onclick="spawnToken('FLASH', 'util-token flash-token')">FLASH</div>
            <div class="spawn-item" style="background: #d35400;" onclick="spawnToken('HE', 'util-token he-token')">HE</div>
            <div class="spawn-item" style="background: #e67e22;" onclick="spawnToken('MOLLY', 'util-token molly-token')">MOLOTOV</div>
            <div class="spawn-item" style="background: #c0392b; grid-column: span 2; border: 2px solid #ff0000;" onclick="spawnToken('C4', 'util-token c4-token')">BOMB (C4)</div>
        </div>
        <button class="btn-clear" style="margin-top: 10px;" onclick="clearTokens('util-token', 'smoke-cloud')">Clear All Utility</button>
    </div>

    <div class="section">
        <h3>4. DRAWING & NOTES</h3>
        <div class="util-grid">
            <button class="btn-clear" onclick="addTextAnnotation()">+ Text Note</button>
            <button class="btn-clear" onclick="undoDraw()">Undo (Ctrl+Z)</button>
        </div>
        <button class="btn-clear" onclick="clearDrawings()">Clear Drawings</button>
    </div>

    <button class="btn-danger" onclick="fullReset()">FULL RESET</button>
</div>

<div id="map-viewport">
    <canvas id="tacticalCanvas"></canvas>
</div>

</html>
